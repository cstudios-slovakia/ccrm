<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Rounded white background for mobile home-screen bookmark aesthetics -->
  <rect width="512" height="512" rx="112" fill="#ffffff" />
  
  <!-- Outer Concentric Circle: Premium Vibrant Orange -->
  <circle cx="256" cy="256" r="180" stroke="#ff5d00" stroke-width="32" fill="none" />
  
  <!-- Middle Concentric Circle: Emerald Green -->
  <circle cx="256" cy="256" r="115" stroke="#10b981" stroke-width="32" fill="none" />
  
  <!-- Inner Concentric Circle: Dark Slate Grey (Solid) -->
  <circle cx="256" cy="256" r="50" fill="#1e293b" />
</svg>